---
name: Validate MIF Bundles and Schemas

"on":
  push:
    branches: [main]
    paths:
      - 'schema/**'
      - 'examples/**'
      - 'profiles/**'
      - 'scripts/*.py'
      - 'test/**'
      - 'docs/**'
      - 'src/content/docs/**'
      - 'package.json'
      - 'astro.config.mjs'
    # No path filter on PRs: this is a required branch-protection gate, so it
    # must run on every PR (a path-filtered required check that doesn't run
    # would block merges indefinitely).
  pull_request:
    branches: [main, "release/**", "develop/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  okf-conformance:
    name: OKF Conformance + Lossless Round-Trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies (hash-pinned)
        run: pip install --require-hashes -r requirements-ci.txt

      - name: OKF conformance test (relationship sync + round-trip)
        run: |
          python scripts/okf_validate.py \
            examples \
            profiles/ai-memory/examples \
            docs/examples/memories

      - name: Lossless markdown -> json-ld -> markdown round-trip
        run: |
          python scripts/mif_convert.py roundtrip \
            examples \
            profiles/ai-memory/examples \
            docs/examples/memories

  schema-validation:
    name: Validate JSON-LD Projection Against Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies (hash-pinned)
        run: pip install --require-hashes -r requirements-ci.txt

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install pinned dependencies (ajv-cli via lockfile)
        run: npm ci

      - name: Emit derived JSON-LD projections
        run: |
          python scripts/mif_convert.py emit-jsonld \
            examples profiles/ai-memory/examples docs/examples/memories \
            --out-dir dist/jsonld

      - name: Validate every projection against schema/mif.schema.json
        run: |
          # ajv-cli detects the parser by file extension and does not recognize
          # .jsonld, so validate .json copies of the derived projections.
          find dist/jsonld -name '*.jsonld' -print0 | while IFS= read -r -d '' f; do
            json="${f%.jsonld}.json"
            cp "$f" "$json"
            echo "Validating $json"
            npx --no-install ajv validate -s schema/mif.schema.json \
              -r "schema/definitions/*.schema.json" \
              -d "$json" --spec=draft2020 -c ajv-formats
          done

  docs-build:
    name: Build Docs Site (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify generated llms.txt preserves the product name
        run: |
          grep -q "Modeled Information Format" dist/llms-full.txt
          grep -q "Modeled Information Format" dist/llms-small.txt

  validate-ontologies:
    # Ontology CONTENT (validate-ontologies.py / validate-namespaces.py's
    # corpus-scanning role) moved to the modeled-information-format/ontologies
    # repo per ADR-018/ADR-019 -- this repo has nothing local for those checks
    # to run against (see scripts/vendor-ontologies.py's docstring and
    # ADR-019's audit trail). test_subtype_of.py stays: it exercises the
    # subtype_of/subsumption resolver in validate-ontologies.py against
    # hardcoded fixtures, not this repo's (nonexistent) corpus, so it's
    # unaffected and still a meaningful regression test for that logic.
    #
    # Job `name:` below is NOT cosmetic -- "Validate Ontology Files" is a
    # required branch-protection status check on main. Renaming it would
    # make that required check permanently unsatisfiable and silently block
    # every future PR. Keep the name exactly as-is even though the job's
    # actual content narrowed.
    name: Validate Ontology Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies (hash-pinned)
        run: pip install --require-hashes -r requirements-ci.txt

      - name: Test subtype_of integrity
        run: python scripts/test_subtype_of.py
