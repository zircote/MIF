name: release

# Attested release for MIF (the spec, JSON Schemas, and tooling).
#
# Every published release attests TWO artifacts with SLSA build provenance,
# both bound to their sha256 digest, keyless via the run's OIDC id-token.
# The source tarball additionally receives a CycloneDX SBOM attestation:
#
#   1. mif-<version>.tar.gz       - reproducible source tarball (git archive of
#                                   the tag tree; gzip -n drops the timestamp).
#   2. mif-schemas-<version>.tar.gz - the consumer-facing JSON Schema bundle:
#                                   the immutable versioned mirror published at
#                                   https://mif-spec.dev/schema/<version>/ (see
#                                   ADR-016 and public/schema/VERSIONING.md).
#
# The signer identity (SAN) of each attestation is THIS workflow. A consumer
# re-verifies (pinning the signer for the strict check):
#
#   gh attestation verify mif-1.0.0.tar.gz \
#     --repo modeled-information-format/MIF \
#     --signer-workflow modeled-information-format/MIF/.github/workflows/release.yml
#
# Publication is fail-closed: the upload step runs only after every attestation
# re-verifies in-run. `workflow_dispatch` exercises build -> attest -> verify as
# a dry-run without cutting a version (no upload). The workflow never creates a
# release itself.

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)attest as a dry-run (e.g. v1.0.0)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  # Fail-closed: a published release must carry a non-empty CHANGELOG entry for
  # its version. On a workflow_dispatch re-attest, gate the supplied tag; with no
  # tag it skips cleanly.
  changelog-check:
    uses: modeled-information-format/.github/.github/workflows/reusable-changelog-check.yml@824b7ba80c0f798bf1be1d4b776e3688b89152fc
    with:
      version: ${{ github.event.release.tag_name || inputs.tag }}

  attest-release:
    name: attest-release
    needs: changelog-check
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC token for keyless Sigstore signing
      attestations: write   # persist the provenance + SBOM attestations
      contents: read        # checkout + gh attestation verify; the release upload now uses the release App token
    steps:
      - name: Resolve checkout ref
        id: ref
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          # What to check out, and (when tag-based) the release tag:
          #   - release event: the published tag.
          #   - workflow_dispatch with a tag: that existing tag (re-attest).
          #   - workflow_dispatch without a tag: current HEAD (dry-run); the
          #     version is read from VERSION.json after checkout.
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG="${EVENT_TAG#refs/tags/}"; REF="${TAG}"
          elif [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG#refs/tags/}"; REF="${TAG}"
          else
            TAG=""; REF="${GITHUB_SHA}"
          fi
          # The tag flows into later run: blocks; reject anything outside the
          # safe charset to close command-substitution injection (empty is ok
          # for the dry-run path).
          case "${TAG}" in
            *[!0-9A-Za-z._-]*) echo "::error::invalid tag '${TAG}'"; exit 1 ;;
          esac
          echo "tag=${TAG}" >>"${GITHUB_OUTPUT}"
          echo "ref=${REF}" >>"${GITHUB_OUTPUT}"

      - name: Checkout at the ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Resolve version
        id: ver
        env:
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          set -euo pipefail
          # Tag-based runs derive the version from the tag; a no-tag dry-run
          # reads the in-development version from VERSION.json (which has a
          # committed schema mirror, so the bundle build and --check succeed).
          if [ -n "${TAG}" ]; then
            VERSION="${TAG#v}"
          else
            VERSION="$(python3 -c 'import json; print(json.load(open("VERSION.json"))["specification"])')"
          fi
          case "${VERSION}" in
            ""|*[!0-9A-Za-z._-]*) echo "::error::invalid version '${VERSION}'"; exit 1 ;;
          esac
          echo "version=${VERSION}" >>"${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >>"${GITHUB_OUTPUT}"
          echo "Resolved tag='${TAG}' version='${VERSION}'"

      - name: Verify schema mirror is present and byte-identical (fail-closed)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # ADR-016: the versioned mirror at public/schema/<version>/ must be
          # snapshotted and committed before tagging. --check fails closed if the
          # mirror (or index.json) is absent or drifts from the canonical bytes,
          # so a tag can never publish a stale or partial schema bundle.
          python3 scripts/snapshot-schema-version.py "${VERSION}" --check

      - name: Build reproducible source tarball
        id: src
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          ARTIFACT="mif-${VERSION}.tar.gz"
          # git archive is deterministic from the commit tree; gzip -n drops the
          # timestamp so the bytes are reproducible for a given git/gzip + OS.
          git archive --format=tar --prefix="mif-${VERSION}/" HEAD \
            | gzip -n > "${ARTIFACT}"
          echo "artifact=${ARTIFACT}" >>"${GITHUB_OUTPUT}"
          sha256sum "${ARTIFACT}"

      - name: Build schema bundle (the consumer-facing versioned mirror)
        id: schemas
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Bundle the immutable per-version schema mirror published at
          # mif-spec.dev/schema/<version>/ (ADR-016). The mirror is committed
          # source under public/schema/<version>/; fail closed if it is missing
          # for this release version, so a tag can never ship without its mirror.
          SRC="public/schema/${VERSION}"
          if [ ! -d "${SRC}" ]; then
            echo "::error::no schema mirror at ${SRC} for version ${VERSION}." \
                 "Run scripts/snapshot-schema-version.py ${VERSION} and commit it before tagging (ADR-016)." >&2
            exit 1
          fi
          ARTIFACT="mif-schemas-${VERSION}.tar.gz"
          tar --sort=name --owner=0 --group=0 --numeric-owner --mtime='UTC 2020-01-01' \
            -cf - -C public/schema "${VERSION}" | gzip -n > "${ARTIFACT}"
          echo "artifact=${ARTIFACT}" >>"${GITHUB_OUTPUT}"
          sha256sum "${ARTIFACT}"

      - name: Generate CycloneDX SBOM (source tree)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: mif-${{ steps.ver.outputs.version }}.sbom.cdx.json
          artifact-name: mif-${{ steps.ver.outputs.version }}.sbom.cdx.json

      - name: Attest build provenance (SLSA) for both artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ steps.src.outputs.artifact }}
            ${{ steps.schemas.outputs.artifact }}

      - name: Attest SBOM against the source tarball
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ steps.src.outputs.artifact }}
          sbom-path: mif-${{ steps.ver.outputs.version }}.sbom.cdx.json

      - name: Verify attestations (fail-closed, before publish)
        env:
          GH_TOKEN: ${{ github.token }}
          SRC_ARTIFACT: ${{ steps.src.outputs.artifact }}
          SCHEMAS_ARTIFACT: ${{ steps.schemas.outputs.artifact }}
        run: |
          set -euo pipefail
          # Re-verify each artifact's provenance in-run. --signer-workflow pins
          # the certificate identity to THIS release workflow, so an attestation
          # from any other workflow would not pass. A failure here fails the job,
          # so the upload step below never runs unverified.
          SIGNER="modeled-information-format/MIF/.github/workflows/release.yml"
          for art in "${SRC_ARTIFACT}" "${SCHEMAS_ARTIFACT}"; do
            echo "Verifying provenance for ${art}"
            gh attestation verify "${art}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${SIGNER}" \
              --predicate-type https://slsa.dev/provenance/v1
          done
          echo "Verifying SBOM for ${SRC_ARTIFACT}"
          gh attestation verify "${SRC_ARTIFACT}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${SIGNER}" \
            --predicate-type https://cyclonedx.org/bom

      - name: Mint release app token (publish identity)
        id: release_token
        if: github.event_name == 'release'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_CLIENT_APP_ID }}
          private-key: ${{ secrets.RELEASE_CLIENT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Upload attested artifacts to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ steps.release_token.outputs.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          SRC_ARTIFACT: ${{ steps.src.outputs.artifact }}
          SCHEMAS_ARTIFACT: ${{ steps.schemas.outputs.artifact }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" \
            "${SRC_ARTIFACT}" \
            "${SCHEMAS_ARTIFACT}" \
            "mif-${VERSION}.sbom.cdx.json" \
            --clobber
