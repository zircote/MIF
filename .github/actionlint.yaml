# actionlint configuration.
#
# daily-docs-review.lock.yml is generated by gh-aw (the .md is the source). It
# declares the custom self-hosted runner label "ubuntu-slim", embeds a workflow
# context (pre_activation) actionlint cannot resolve, and carries shellcheck
# style hints in generated scripts. Those are properties of the generator, not
# hand-authored defects, so they are scoped to that one generated file rather
# than excluding it from linting entirely.

self-hosted-runner:
  labels:
    - ubuntu-slim

paths:
  .github/workflows/daily-docs-review.lock.yml:
    ignore:
      - 'property "pre_activation" is not defined'
      - 'shellcheck reported issue in this script'
