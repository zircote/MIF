# actionlint configuration.
#
# The gh-aw-generated workflows (the .lock.yml plus agentics-maintenance.yml) are
# produced by gh-aw, not hand-authored. They declare the custom self-hosted
# runner label "ubuntu-slim", embed a workflow context (pre_activation)
# actionlint cannot resolve, carry shellcheck style hints in generated scripts,
# use gh-aw's `concurrency.queue` extension, and include an intentional empty-
# string default in a workflow_dispatch choice. Those are properties of the
# generator, not defects; `gh aw lint`/`gh aw validate` accept them. They are
# scoped to the generated files rather than excluding those files from linting.

self-hosted-runner:
  labels:
    - ubuntu-slim

paths:
  .github/workflows/daily-docs-review.lock.yml:
    ignore:
      - 'property "pre_activation" is not defined'
      - 'shellcheck reported issue in this script'
      - 'unexpected key "queue" for "concurrency" section'
  .github/workflows/agentics-maintenance.yml:
    ignore:
      - 'string should not be empty'
