apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: north-pasture-soil-profile-2026
  title: North Pasture Soil Profile (Jan 2026)
  description: |
    Annual soil health assessment showing 4.2% organic matter,
    38.5 tons CO2e/acre soil carbon.
  annotations:
    modeled-information-format.github.io/entity-type: soil-profile
    modeled-information-format.github.io/entity-id: soil-north-2026-01
    modeled-information-format.github.io/organic-matter: "4.2"
    modeled-information-format.github.io/soil-carbon: "38.5"
    modeled-information-format.github.io/ph: "6.8"
    modeled-information-format.github.io/lab: "Ward Laboratories"
  tags:
    - soil-health
    - carbon
    - lab-results
spec:
  type: dataset
  owner: group:farm-operations-team
  system: north-pasture-system

