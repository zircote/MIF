---
# Backstage Software Catalog - Regenerative Agriculture Example
#
# This demonstrates how MIF regenerative-agriculture ontology entities
# map to Backstage catalog entities.
#
# Usage: Place in your repository root or reference via catalog locations.

# ===========================================================================
# DOMAIN: Farm Operation
# ===========================================================================
# MIF entity_type: farm -> Backstage Kind: Domain
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: sunrise-regenerative-farm
  title: Sunrise Regenerative Farm
  description: |
    120-acre regenerative farm operation focused on soil health,
    carbon sequestration, and sustainable livestock management.
  annotations:
    # MIF ontology mapping
    modeled-information-format.github.io/ontology: regenerative-agriculture
    modeled-information-format.github.io/entity-type: farm
    modeled-information-format.github.io/entity-id: farm-sunrise
    # Certifications
    modeled-information-format.github.io/certification: roc_silver
    modeled-information-format.github.io/certification-status: active
    # Metrics
    modeled-information-format.github.io/total-acres: "120"
    modeled-information-format.github.io/regenerative-since: "2021"
  tags:
    - regenerative
    - certified-organic
    - carbon-positive
  links:
    - url: https://example.com/sunrise-farm
      title: Farm Website
    - url: https://rodaleinstitute.org/roc
      title: ROC Certification Info
spec:
  owner: group:farm-operations-team

---
# ===========================================================================
# SYSTEM: Field / Pasture Units
# ===========================================================================
# MIF entity_type: field -> Backstage Kind: System
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: north-pasture-system
  title: North Pasture (40 acres)
  description: |
    40-acre rotational grazing system with improved pasture mix.
    Primary grazing area for beef cattle herd.
  annotations:
    modeled-information-format.github.io/entity-type: field
    modeled-information-format.github.io/entity-id: field-north-pasture
    modeled-information-format.github.io/acres: "40"
    modeled-information-format.github.io/field-type: pasture
    modeled-information-format.github.io/soil-carbon-tons: "38.5"
  tags:
    - pasture
    - grazing
    - carbon-sequestration
spec:
  owner: group:farm-operations-team
  domain: sunrise-regenerative-farm

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: south-cropland-system
  title: South Cropland (60 acres)
  description: |
    60-acre no-till cropland with diverse cover crop rotation.
    Cash crops: corn, soybeans, small grains.
  annotations:
    modeled-information-format.github.io/entity-type: field
    modeled-information-format.github.io/entity-id: field-south-cropland
    modeled-information-format.github.io/acres: "60"
    modeled-information-format.github.io/field-type: cropland
    modeled-information-format.github.io/irrigation: dryland
  tags:
    - cropland
    - no-till
    - cover-crops
spec:
  owner: group:farm-operations-team
  domain: sunrise-regenerative-farm

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: beef-cattle-herd
  title: Beef Cattle Herd
  description: |
    85-head grass-fed beef cattle herd managed with adaptive
    multi-paddock (AMP) rotational grazing.
  annotations:
    modeled-information-format.github.io/entity-type: herd
    modeled-information-format.github.io/entity-id: herd-beef-main
    modeled-information-format.github.io/species: cattle
    modeled-information-format.github.io/breed: angus-cross
    modeled-information-format.github.io/head-count: "85"
    modeled-information-format.github.io/purpose: beef
  tags:
    - livestock
    - grass-fed
    - rotational-grazing
spec:
  owner: group:farm-operations-team
  domain: sunrise-regenerative-farm

---
# ===========================================================================
# COMPONENTS: Procedures & Plans
# ===========================================================================
# MIF entity_type: grazing-plan -> Backstage Kind: Component (type: procedure)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: 2026-grazing-rotation-plan
  title: 2026 Grazing Rotation Plan
  description: |
    Annual adaptive multi-paddock grazing plan for beef herd.
    45-day recovery periods, high stock density moves.
  annotations:
    modeled-information-format.github.io/entity-type: grazing-plan
    modeled-information-format.github.io/entity-id: grazing-plan-2026
    modeled-information-format.github.io/stock-density: "250000"
    modeled-information-format.github.io/rest-period-days: "45"
  tags:
    - procedure
    - grazing
    - "2026"
spec:
  type: procedure
  lifecycle: production
  owner: group:farm-operations-team
  system: beef-cattle-herd

---
# MIF entity_type: crop-rotation -> Backstage Kind: Component (type: procedure)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: 5-year-crop-rotation
  title: 5-Year Crop Rotation Plan
  description: |
    Five-year rotation: Corn -> Soybeans -> Small Grain + Cover ->
    Cover Crop Mix -> Corn. Designed for soil health and nitrogen cycling.
  annotations:
    modeled-information-format.github.io/entity-type: crop-rotation
    modeled-information-format.github.io/entity-id: rotation-south-5yr
    modeled-information-format.github.io/rotation-years: "5"
  tags:
    - procedure
    - rotation
    - cover-crops
spec:
  type: procedure
  lifecycle: production
  owner: group:farm-operations-team
  system: south-cropland-system

