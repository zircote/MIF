  title: Buyer Contract Interface
  description: |
    Contract terms and delivery schedules with primary buyer
    (Local Foods Cooperative).
  annotations:
    modeled-information-format.github.io/entity-type: contract
    modeled-information-format.github.io/entity-id: contract-lfc-2026
    modeled-information-format.github.io/buyer: "Local Foods Cooperative"
    modeled-information-format.github.io/product: "grass-fed beef"
spec:
  type: contract
  lifecycle: production
  owner: group:farm-operations-team
  system: beef-cattle-herd
  definition: |
    Contract for 50 head annually at $3.50/lb hanging weight.
    Delivery: Monthly, October-March.
